name: Build & Release SonicSurge

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate icon assets
        run: node scripts/convert-icon.js

      - name: Build React app
        run: npm run build

      - name: Build Electron installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --win --x64

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: SonicSurge-Windows
          path: |
            dist-electron/*.exe
            dist-electron/*.yml

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-electron/*.exe
          body: |
            ## SonicSurge ${{ github.ref_name }}

            ### 🎵 Gaming Soundboard for Valorant & Discord

            **Features:**
            - Instant hotkey-triggered sound playback
            - Safe Push-To-Talk simulation (standard Windows keyboard input)
            - Virtual audio pipeline for mic routing
            - YouTube/Instagram audio import via yt-dlp
            - Global hotkeys work while games are focused

            **Installation:**
            Download and run `SonicSurge-Setup-*.exe`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
